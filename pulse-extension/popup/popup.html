<!doctype html>
<html>
  <body style="width:300px;padding:14px;font-family:'Segoe UI',sans-serif;background:#f9fafb;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
      <div style="width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#186132,#14D571);display:flex;align-items:center;justify-content:center;">
        <span style="color:#fff;font-size:14px;">◉</span>
      </div>
      <strong style="font-size:14px;color:#0B1C48;">UXpact Pulse</strong>
    </div>
    <p style="font-size:11px;color:#6B7280;margin:0 0 8px;">Paste your Audit ID to sync your fix checklist.</p>
    <input id="auditId" placeholder="Paste Audit ID here" style="width:100%;box-sizing:border-box;padding:8px 10px;font-size:12px;border:1px solid #e5e7eb;border-radius:6px;margin-bottom:8px;outline:none;" />
    <button id="syncBtn" style="width:100%;padding:9px;background:linear-gradient(135deg,#186132,#14D571);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;">Sync checklist</button>
    <p id="status" style="font-size:11px;color:#6B7280;margin:8px 0 0;min-height:16px;"></p>
    <script src="popup.js"></script>
  </body>
</html>
