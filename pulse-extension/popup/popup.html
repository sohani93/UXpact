<!doctype html>
<html>
  <body style="width:280px;padding:12px;font-family:sans-serif;">
    <h3 style="margin:0 0 10px;font-size:14px;">UXpact Pulse</h3>
    <div id="setupSection">
      <p style="font-size:11px;color:#6B7280;margin:0 0 6px;">Enter your Supabase anon key (first time only)</p>
      <input id="anonKey" placeholder="eyJ..." style="width:100%;box-sizing:border-box;margin-bottom:6px;padding:6px;font-size:11px;border:1px solid #e5e7eb;border-radius:4px;" />
    </div>
    <input id="auditId" placeholder="Audit ID" style="width:100%;box-sizing:border-box;margin-bottom:6px;padding:6px;font-size:12px;border:1px solid #e5e7eb;border-radius:4px;" />
    <button id="syncBtn" style="width:100%;padding:8px;background:#148C59;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;">Sync checklist</button>
    <p id="status" style="font-size:11px;color:#6B7280;margin:6px 0 0;"></p>
    <script src="popup.js"></script>
  </body>
</html>
